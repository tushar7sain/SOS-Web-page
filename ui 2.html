<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS</title>
    <link rel="stylesheet" href="ui 2.css">
    <script src="ui.js" defer></script>
</head>

<body>

    <!-- Header -->

    <div class="header">
        <div class="nav">hello</div>
        <div>
            <h1 class="welcome-text"> Welcome to SOS </h1>
        </div>
        <button class="Login-btn" ><a href="login.html">LOGIN</a></button>
    </div>

    <!-- Title -->

    <div class="title">
        <h3> Are you in emergency? </h3>
        <p> Press the button below help will reach you soon </p>
    </div>

    <!-- SOS-button -->

   <div class="sos-wrapper">
        <div class="circle1">
            <div class="circle2">
                <button class="circle3-btn">SOS</button>
            </div>
        </div>
   </div>
   <div id="sosBox" style="display:none; text-align:center; margin-top:20px;">
    <h2 id="timerText">30</h2>
    <p>Sending alert in...</p>
    <button onclick="cancelSOS()">Cancel</button>
</div>

   <!-- safe-mode -->

   <div class="safe-mode">
    <button class="safe-btn" ><a href="cal.html"> Safe Mode </a></button>
   </div>

    <!-- Bottom-nav-bar -->

     <nav class="nav-bar-bottom2">
        <ul class="links">
            <li><a href="ui.html">Home</a></li>
            <li><a href="#">Location</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
     </nav>
</body>
</html>
